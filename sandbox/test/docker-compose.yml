
name: agents-group
networks:
    1panel-network:
        external: true
services:
  pi:
    build: .
    image: sorc/sandbox-node:24.04
    container_name: pi
    hostname: xavier-pi
    restart: always
    networks:
      - 1panel-network
    environment:
      - MULTICA_TOKEN=${MULTICA_TOKEN_PI}
      - MULTICA_SERVER_URL=${MULTICA_SERVER_URL}
      - MULTICA_APP_URL=${MULTICA_APP_URL}
      - LOG_LEVEL=info
    volumes:
      - ./pi/home:/home/sorc
      - ./pi/setup:/docker-entrypoint-init.d/99-setup
      - /datadisk/test:/datadisk/test
      - /opt/docker:/opt/docker
      - /var/run/docker.sock:/var/run/docker.sock
    tty: true
    stdin_open: true
    command: >
      bash -c "source ~/.bashrc && multica daemon start --foreground"
# bash -c "source ~/.bashrc && multica config set server_url ${MULTICA_SERVER_URL} && multica config set app_url ${MULTICA_APP_URL} && multica login --token ${MULTICA_TOKEN_PI}"
  opencode:
    build: .
    image: sorc/sandbox-node:24.04
    container_name: opencode
    hostname: xavier-oc
    restart: always
    networks:
      - 1panel-network
    ports:
      - 11911:11911
    environment:
      - MULTICA_TOKEN=${MULTICA_TOKEN_OPENCODE}
      - MULTICA_SERVER_URL=${MULTICA_SERVER_URL}
      - MULTICA_APP_URL=${MULTICA_APP_URL}
      - LOG_LEVEL=info
    volumes:
      - ./opencode/home:/home/sorc
      - ./opencode/setup:/docker-entrypoint-init.d
      - /datadisk/test:/datadisk/test
      - /home/sorc/workspaces:/home/sorc/workspaces
      - /opt/docker:/opt/docker
      - /var/run/docker.sock:/var/run/docker.sock
    tty: true
    stdin_open: true
    command: >
      bash -c "source ~/.bashrc && oc && multica daemon start --foreground"
